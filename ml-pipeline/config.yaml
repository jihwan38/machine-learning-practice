project:
  name: "Plogging_GeoAI"
  version: "V1_Demo"

spatial:
  base_crs: "EPSG:4326"
  projected_crs: "EPSG:5179"
  grid_size_meters: 10
  buffer_size_meters: 10
  target_region: "Dong-gu, Gwangju, South Korea"

pipeline:
  default_feature_type: "poi"
  default_view_type: "baseline"

data:
  paths:
    raw: "./data/raw"
    processed: "./data/processed"
    models: "./data/models"

model:
  training:
    random_seed: 42
    test_size: 0.2
  xgboost:
    n_estimators: 10
    max_depth: 6
    n_jobs: -1
    eval_metric: "logloss"
