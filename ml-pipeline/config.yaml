project:
  name: "Plogging_GeoAI"
  version: "V1_Demo"

spatial:
  base_crs: "EPSG:4326"        # WGS84 위경도 좌표계 (GraphHopper 호환 및 원본 OSM용)
  projected_crs: "EPSG:5179"   # KATEC 한국 좌표계 (10m 등 미터 단위 계산 및 그리드 생성용)
  grid_size_meters: 10         # 10m x 10m 격자 (논문 기반 모델링용)
  target_region: "Gwangju, South Korea" # 테스트용 추출 타겟 지역

data:
  paths:
    raw: "../data/raw"         # 원본 데이터 저장 경로
    processed: "../data/processed" # 그리드 및 결과 저장 경로
    models: "./models"         # pkl 등 모델 저장 경로
