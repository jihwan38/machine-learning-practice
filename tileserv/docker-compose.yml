version: '3.8'

services:
  # 클라이언트 지도 렌더링을 위한 실시간 공간 데이터(벡터 타일) 제공 서버
  pg_tileserv:
    image: crunchydata/pg_tileserv:latest
    container_name: geoai_tileserv
    ports:
      - "7800:7800"
    env_file:
      # AWS RDS 주소를 주입받기 위한 파일
      - .env
    environment:
      # pg_tileserv는 DATABASE_URL 환경변수를 기본으로 사용합니다.
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7800/"]
      interval: 30s
      timeout: 10s
      retries: 3
