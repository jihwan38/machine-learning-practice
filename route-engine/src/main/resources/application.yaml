spring:
  application:
    name: route-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/geoai}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      maximum-pool-size: 15 # 라우팅 엔진은 병렬 쿼리가 많으므로 기본값(10)보다 약간 늘림
      minimum-idle: 5
      connection-timeout: 20000

  # Spring Data JDBC Configuration
  data:
    jdbc:
      repositories:
        enabled: true
