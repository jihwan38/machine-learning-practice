version: '3.8'

services:
  # 핫스팟 확률(0.0~1.0)을 정밀하게 적용하기 위한 Java/Spring Boot 기반 라우팅 서버
  route-engine:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: geoai_route_engine
    ports:
      - "8989:8989"  # GraphHopper/Spring Boot 통합 포트
    env_file:
      - .env
    volumes:
      - ./graph-cache:/app/graph-cache
      - ./map-data:/app/map-data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/health"]
      interval: 30s
      timeout: 10s
      retries: 3
